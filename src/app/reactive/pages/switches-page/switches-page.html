<h2 class="text-2xl font-semibold">Reactivos: Switches</h2>
<hr class="my-4 border-gray-300">

<form autocomplete="off" class="space-y-6 max-w-3xl">

  <!-- Radio -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
    <label class="md:col-span-1 font-medium text-gray-700">Género</label>
    
    <div class="md:col-span-2 space-y-2">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio"
               value="M"
               id="radioMasculino"
               class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
        <span>Masculino</span>
      </label>

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio"
               value="F"
               id="radioFemenino"
               class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
        <span>Femenino</span>
      </label>
    </div>
  </div>

  <!-- Switch Notificaciones -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
    <label class="md:col-span-1 font-medium text-gray-700">Notificaciones</label>
    
    <div class="md:col-span-2">
      <label class="inline-flex items-center cursor-pointer">
        <input type="checkbox" class="sr-only peer">
        
        <!-- Switch -->
        <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600 relative transition">
          <div class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition peer-checked:translate-x-5"></div>
        </div>

        <span class="ml-3">Quiero recibir notificaciones</span>
      </label>
    </div>
  </div>

  <!-- Términos -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
    <label class="md:col-span-1"></label>

    <div class="md:col-span-2">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox"
               id="flexCheckDefault"
               class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        <span>Términos y condiciones de uso</span>
      </label>

      <span class="text-sm text-red-500 block mt-1">
        Debe de aceptar las condiciones de uso
      </span>
    </div>
  </div>

  <!-- Botón -->
  <div class="flex justify-end">
    <button type="submit"
            class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">
      Guardar
    </button>
  </div>

</form>

<!-- Debug -->
<div class="mt-6 space-y-4 text-sm">
  <div>
    <h5 class="font-semibold">Valor del formulario</h5>
    <pre class="bg-gray-100 p-2 rounded">{{ 'object' | json }}</pre>
  </div>

  <div>
    <h5 class="font-semibold">Persona</h5>
    <pre class="bg-gray-100 p-2 rounded">{{ 'object' | json }}</pre>
  </div>

  <div>
    <h5 class="font-semibold">Valid</h5>
    <pre class="bg-gray-100 p-2 rounded">{{ 'object' | json }}</pre>
  </div>
</div>
