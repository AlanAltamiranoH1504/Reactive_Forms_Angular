<h2 class="text-2xl font-semibold">Reactivos: Básicos</h2>
<hr class="my-4 border-gray-300">

<div class="max-w-2xl">
  <form autocomplete="off" class="space-y-6">

    <!-- Campo de producto -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
      <label class="md:col-span-1 font-medium text-gray-700">Producto</label>
      <div class="md:col-span-2">
        <input type="text"
               class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Nombre del producto">

        <span class="text-sm text-red-500">
          error message
        </span>
      </div>
    </div>

    <!-- Campo de precio -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
      <label class="md:col-span-1 font-medium text-gray-700">Precio</label>
      <div class="md:col-span-2">
        <input type="number"
               class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Precio del producto">

        <span class="text-sm text-red-500">
          El precio debe de ser 0 o mayor
        </span>
      </div>
    </div>

    <!-- Campo de existencias -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
      <label class="md:col-span-1 font-medium text-gray-700">Existencias</label>
      <div class="md:col-span-2">
        <input type="number"
               class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Existencias del producto">

        <span class="text-sm text-red-500">
          Las existencias deben de ser 0 o mayor
        </span>
      </div>
    </div>

    <!-- Botón -->
    <div class="flex justify-end">
      <button type="submit"
              class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
        Guardar
      </button>
    </div>

  </form>
</div>

<!-- Debug info -->
<div class="mt-8">
  <div class="space-y-4 text-sm">
    <div>
      <span class="font-semibold">Valid</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>

    <div>
      <span class="font-semibold">Pristine</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>

    <div>
      <span class="font-semibold">Touched</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>

    <div>
      <span class="font-semibold">Value</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>

    <div>
      <span class="font-semibold">Precio</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>

    <div>
      <span class="font-semibold">Producto</span>
      <pre class="bg-gray-100 p-2 rounded">{{ 'objeto' | json }}</pre>
    </div>
  </div>
</div>
