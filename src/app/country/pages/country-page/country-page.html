<form class="space-y-4">
  <!-- Region -->
  <div>
    <label class="block mb-1 font-medium text-gray-700">Continente:</label>
    <select formControlName="region" class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">-- Seleccione Continente --</option>
    </select>
  </div>

  <!-- Countries -->
  <div>
    <label class="block mb-1 font-medium text-gray-700">País:</label>
    <select formControlName="country" class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">-- Seleccione País --</option>
    </select>
  </div>

  <!-- Borders -->
  <div>
    <label class="block mb-1 font-medium text-gray-700">Fronteras:</label>
    <select formControlName="border" class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">-- Seleccione la frontera --</option>
    </select>
  </div>
</form>
